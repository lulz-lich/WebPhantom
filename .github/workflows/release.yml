name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tooling
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest
      - name: Build package
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: webphantom-dist
          path: dist/*
