name: Bug Report
description: Report a safe, reproducible WebPhantom bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not include secrets, credentials, private cookies, or unauthorized target data."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Use a local/demo target where possible.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "webphantom --version"
  - type: textarea
    id: logs
    attributes:
      label: Relevant Output
      render: shell
