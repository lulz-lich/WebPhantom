name: Feature Request
description: Suggest a passive, authorized-use improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Features involving exploitation, brute forcing, bypasses, stealth, persistence, credential theft, or destructive behavior are out of scope."
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What assessment or documentation workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the safe implementation you would like.
    validations:
      required: true
